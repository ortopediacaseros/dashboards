<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ortopedia Caseros — Acceso</title>
  <script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');</script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--teal);
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .login-error {
      background: var(--red-dim);
      border: 1px solid rgba(255,91,91,0.25);
      border-radius: var(--radius-sm);
      color: var(--red);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <img src="img/logo.jpg" alt="Ortopedia Caseros"
        style="height:110px;width:auto;max-width:260px;object-fit:contain;border-radius:8px">
    </div>
    <div class="login-sub" style="text-align:center;margin-bottom:28px">Sistema de gestión interno</div>

    <div class="login-error" id="login-error"></div>

    <form id="form-login">
      <div class="form-group">
        <label>Contraseña</label>
        <div style="position:relative">
          <input type="password" class="input" id="input-password"
            placeholder="••••••••" required autofocus style="padding-right:44px">
          <button type="button" id="btn-toggle-pass"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0;line-height:1">
            👁
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login" style="margin-top:8px">
        Ingresar
      </button>
    </form>

    <script>
      document.getElementById('btn-toggle-pass').addEventListener('click', () => {
        const inp = document.getElementById('input-password');
        inp.type = inp.type === 'password' ? 'text' : 'password';
      });
    </script>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
